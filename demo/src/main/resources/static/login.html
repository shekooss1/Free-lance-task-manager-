<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — FreeLance Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --ink: #0b0c10;
            --ink-2: #1a1c23;
            --muted: #7a7f96;
            --muted-2: #a0a5bc;
            --surface: rgba(255,255,255,0.035);
            --surface-2: rgba(255,255,255,0.065);
            --border: rgba(255,255,255,0.08);
            --border-2: rgba(255,255,255,0.16);
            --gold: #e8c87a;
            --gold-dim: #b8973a;
            --gold-glow: rgba(232,200,122,0.18);
            --teal: #4fd1c5;
            --text: #e8e9f0;
            --text-2: #c0c3d4;
            --red: #f87171;
        }

        html, body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--ink);
            overflow-x: hidden;
            color: var(--text);
        }

        /* BACKGROUND */

        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                    radial-gradient(ellipse 80% 60% at 20% 10%, #141829 0%, transparent 65%),
                    radial-gradient(ellipse 60% 80% at 80% 90%, #0d1a18 0%, transparent 60%),
                    #0b0c10;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image:
                    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.55;
            animation: drift 18s ease-in-out infinite alternate;
        }

        .o1 {
            width: 500px;
            height: 500px;
            top: -140px;
            left: -100px;
            background: radial-gradient(circle, #1a2a4a 0%, transparent 75%);
        }

        .o2 {
            width: 420px;
            height: 420px;
            bottom: -120px;
            right: -100px;
            background: radial-gradient(circle, #0d2a25 0%, transparent 75%);
        }

        @keyframes drift {
            from { transform: translate(0,0) scale(1); }
            to { transform: translate(30px,25px) scale(1.06); }
        }

        /* PAGE */

        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        /* CARD */

        .card {
            width: 100%;
            max-width: 430px;

            background: linear-gradient(
                    145deg,
                    rgba(255,255,255,0.055),
                    rgba(255,255,255,0.02)
            );

            border: 1px solid var(--border-2);

            border-radius: 24px;

            padding: 2.6rem;

            backdrop-filter: blur(28px) saturate(1.4);

            box-shadow:
                    0 40px 80px rgba(0,0,0,0.55),
                    0 0 60px rgba(232,200,122,0.04);

            animation: cardIn .7s ease forwards;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* LOGO */

        .logo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--gold-dim), var(--gold));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 20px var(--gold-glow);
        }

        .logo-name {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            letter-spacing: .04em;
        }

        .logo-name span {
            color: var(--gold);
        }

        /* TEXT */

        .heading {
            font-family: 'Syne', sans-serif;
            font-size: 1.9rem;
            margin-bottom: .4rem;
        }

        .subheading {
            color: var(--muted-2);
            font-size: .9rem;
            margin-bottom: 2rem;
        }

        .subheading a {
            color: var(--gold);
            text-decoration: none;
        }

        /* FORM */

        .form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .field label {
            display: block;
            margin-bottom: .5rem;
            font-size: .78rem;
            color: var(--muted-2);
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        .input-wrap {
            position: relative;
        }

        .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
        }

        .input-wrap input {
            width: 100%;
            padding: .85rem 1rem .85rem 2.7rem;

            background: var(--surface);

            border: 1px solid var(--border);

            border-radius: 12px;

            outline: none;

            color: var(--text);

            font-size: .92rem;

            transition: .25s;
        }

        .input-wrap input::placeholder {
            color: var(--muted);
        }

        .input-wrap input:focus {
            border-color: rgba(232,200,122,0.45);

            background: var(--surface-2);

            box-shadow:
                    0 0 0 3px rgba(232,200,122,0.08),
                    0 0 20px rgba(232,200,122,0.05);
        }

        /* PASSWORD TOGGLE */

        .pw-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
        }

        /* OPTIONS */

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: -.2rem;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted-2);
            font-size: .82rem;
        }

        .remember input {
            accent-color: var(--gold);
        }

        .forgot {
            color: var(--gold);
            text-decoration: none;
            font-size: .82rem;
        }

        /* BUTTON */

        .btn-submit {
            width: 100%;
            padding: .9rem;

            border: none;

            border-radius: 12px;

            cursor: pointer;

            background: linear-gradient(
                    135deg,
                    var(--gold),
                    #d4a843
            );

            color: var(--ink);

            font-family: 'Syne', sans-serif;
            font-weight: 700;
            letter-spacing: .04em;

            transition: .25s;

            box-shadow:
                    0 8px 24px rgba(232,200,122,0.25);
        }

        .btn-submit:hover {
            transform: translateY(-2px);

            box-shadow:
                    0 12px 30px rgba(232,200,122,0.3);
        }

        /* ERROR */

        .error {
            display: none;
            color: var(--red);
            font-size: .8rem;
            margin-top: -.4rem;
        }

        /* RESPONSIVE */

        @media(max-width: 500px) {
            .card {
                padding: 2rem 1.5rem;
            }

            .heading {
                font-size: 1.6rem;
            }
        }

    </style>
</head>

<body>

<div class="bg">
    <div class="bg-grid"></div>
    <div class="bg-orb o1"></div>
    <div class="bg-orb o2"></div>
</div>

<div class="page">

    <div class="card">

        <!-- LOGO -->
        <div class="logo-row">
            <div class="logo-icon">⚡</div>
            <div class="logo-name">
                Free<span>Lance</span> Portal
            </div>
        </div>

        <!-- HEADING -->
        <h1 class="heading">Welcome back</h1>

        <p class="subheading">
            Don’t have an account?
            <a href="register.html">Create one</a>
        </p>

        <!-- FORM -->
        <form class="form" id="login-form">

            <!-- EMAIL -->
            <div class="field">

                <label>Email Address</label>

                <div class="input-wrap">

                    <svg class="icon" xmlns="http://www.w3.org/2000/svg"
                         width="15" height="15" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2">

                        <rect width="20" height="16" x="2" y="4" rx="2"/>
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>

                    </svg>

                    <input
                            type="email"
                            id="email"
                            placeholder="you@example.com"
                            required
                    >

                </div>

            </div>

            <!-- PASSWORD -->
            <div class="field">

                <label>Password</label>

                <div class="input-wrap">

                    <svg class="icon" xmlns="http://www.w3.org/2000/svg"
                         width="15" height="15" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2">

                        <rect width="18" height="11" x="3" y="11" rx="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>

                    </svg>

                    <input
                            type="password"
                            id="password"
                            placeholder="Enter your password"
                            required
                    >

                    <button
                            type="button"
                            class="pw-toggle"
                            onclick="togglePassword()">

                        👁

                    </button>

                </div>

            </div>

            <!-- OPTIONS -->
            <div class="options-row">

                <label class="remember">
                    <input type="checkbox">
                    Remember me
                </label>

                <a href="#" class="forgot">
                    Forgot password?
                </a>

            </div>

            <!-- ERROR -->
            <div class="error" id="error-msg">
                Invalid email or password
            </div>

            <!-- BUTTON -->
            <button type="submit" class="btn-submit" id="login-btn">
                Sign In →
            </button>

        </form>

    </div>

</div>

<script>

    function togglePassword() {

        const input = document.getElementById('password');

        input.type =
            input.type === 'password'
                ? 'text'
                : 'password';
    }

    document
        .getElementById('login-form')
        .addEventListener('submit', function(e) {

            e.preventDefault();

            const email =
                document.getElementById('email').value.trim();

            const password =
                document.getElementById('password').value;

            const btn =
                document.getElementById('login-btn');

            const error =
                document.getElementById('error-msg');

            error.style.display = 'none';

            btn.innerHTML = 'Signing in...';
            btn.disabled = true;

            fetch('/api/auth/login', {

                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({
                    email,
                    password
                })

            })

                .then(res => res.json())

                .then(data => {

                    if(data.success) {

                        btn.innerHTML = '✓ Welcome Back';

                        setTimeout(() => {
                            window.location.href = '/dashboard';
                        }, 1200);

                    } else {

                        error.style.display = 'block';

                        btn.innerHTML = 'Sign In →';

                        btn.disabled = false;
                    }

                })

                .catch(() => {

                    error.style.display = 'block';

                    btn.innerHTML = 'Sign In →';

                    btn.disabled = false;
                });

        });

</script>

</body>
</html>
