<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Freelancer Dashboard — FreeLance Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#0b0c10;--muted:#7a7f96;--muted-2:#a0a5bc;
  --surface:rgba(255,255,255,0.035);--surface-2:rgba(255,255,255,0.065);
  --border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.16);
  --gold:#e8c87a;--gold-dim:#b8973a;--gold-glow:rgba(232,200,122,0.18);
  --teal:#4fd1c5;--red:#f87171;--green:#4ade80;
  --text:#e8e9f0;--text-2:#c0c3d4;
}
html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--text);overflow-x:hidden;}

.bg{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 20% 10%,#141829 0%,transparent 65%),
  radial-gradient(ellipse 60% 80% at 80% 90%,#0d1a18 0%,transparent 60%),#0b0c10;}
.bg-grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:48px 48px;}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;animation:drift 18s ease-in-out infinite alternate;}
.o1{width:500px;height:500px;top:-140px;left:-100px;background:radial-gradient(circle,#1a2a4a 0%,transparent 75%);}
.o2{width:420px;height:420px;bottom:-120px;right:-100px;background:radial-gradient(circle,#0d2a25 0%,transparent 75%);}
@keyframes drift{from{transform:translate(0,0) scale(1);}to{transform:translate(30px,25px) scale(1.06);}}

.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}

nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;
  border-bottom:1px solid var(--border);backdrop-filter:blur(20px);
  background:rgba(11,12,16,0.6);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--gold-dim),var(--gold));
  display:flex;align-items:center;justify-content:center;font-size:16px;
  box-shadow:0 0 16px var(--gold-glow);}
.logo-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:.04em;}
.logo-name span{color:var(--gold);}
.nav-center{display:flex;gap:.3rem;}
.tab-btn{padding:.45rem 1rem;border:1px solid transparent;border-radius:8px;
  background:transparent;color:var(--muted-2);font-size:.82rem;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:.2s;letter-spacing:.02em;}
.tab-btn.active{background:rgba(79,209,197,0.08);border-color:rgba(79,209,197,0.2);color:var(--teal);}
.tab-btn:hover:not(.active){color:var(--text);}
.nav-right{display:flex;align-items:center;gap:1rem;}
.nav-user{font-size:.85rem;color:var(--muted-2);}
.nav-user strong{color:var(--teal);}
.btn-logout{padding:.45rem 1rem;border:1px solid var(--border-2);border-radius:8px;
  background:transparent;color:var(--muted-2);font-size:.8rem;cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}

main{flex:1;padding:2rem;max-width:1100px;width:100%;margin:0 auto;}

.page-header{margin-bottom:2rem;animation:fadeUp .5s ease forwards;}
.page-header h1{font-family:'Syne',sans-serif;font-size:1.8rem;margin-bottom:.3rem;}
.page-header p{color:var(--muted-2);font-size:.9rem;}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:1.2rem 1.4rem;animation:fadeUp .5s ease forwards;opacity:0;}
.stat-card:nth-child(1){animation-delay:.1s;}
.stat-card:nth-child(2){animation-delay:.2s;}
.stat-card:nth-child(3){animation-delay:.3s;}
.stat-card:nth-child(4){animation-delay:.4s;}
.stat-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;}
.stat-value{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:700;}
.stat-value.gold{color:var(--gold);}
.stat-value.teal{color:var(--teal);}
.stat-value.green{color:var(--green);}

/* PANELS */
.panel{display:none;}
.panel.active{display:block;animation:fadeUp .4s ease forwards;}

/* TASKS GRID */
.tasks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;}

.task-card{background:linear-gradient(145deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));
  border:1px solid var(--border-2);border-radius:16px;padding:1.3rem;transition:.2s;}
.task-card:hover{border-color:rgba(79,209,197,0.25);transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.task-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.7rem;gap:.5rem;}
.task-card-title{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:600;line-height:1.3;}
.task-card-desc{font-size:.82rem;color:var(--muted-2);margin-bottom:1rem;line-height:1.5;}
.task-card-footer{display:flex;justify-content:space-between;align-items:center;}
.task-card-meta{display:flex;gap:.4rem;flex-wrap:wrap;}

/* MY TASKS */
.my-tasks-list{display:flex;flex-direction:column;gap:.8rem;}
.my-task-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:1rem 1.2rem;transition:.2s;}
.my-task-item:hover{border-color:var(--border-2);}
.my-task-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem;}
.my-task-title{font-weight:500;font-size:.9rem;}
.my-task-desc{font-size:.8rem;color:var(--muted-2);margin-bottom:.7rem;line-height:1.5;}
.my-task-footer{display:flex;justify-content:space-between;align-items:center;}

/* CARD WRAPPER */
.section-card{background:linear-gradient(145deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));
  border:1px solid var(--border-2);border-radius:20px;padding:1.6rem;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;}
.section-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;}
.section-badge{font-size:.72rem;padding:.3rem .7rem;border-radius:99px;
  background:rgba(79,209,197,0.1);color:var(--teal);border:1px solid rgba(79,209,197,0.2);}

/* BADGES */
.badge{font-size:.68rem;padding:.25rem .65rem;border-radius:99px;font-weight:500;}
.badge-open{background:rgba(232,200,122,0.12);color:var(--gold);border:1px solid rgba(232,200,122,0.2);}
.badge-progress{background:rgba(79,209,197,0.1);color:var(--teal);border:1px solid rgba(79,209,197,0.2);}
.badge-done{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.2);}
.badge-high{background:rgba(248,113,113,0.1);color:var(--red);}
.badge-medium{background:rgba(232,200,122,0.1);color:var(--gold);}
.badge-low{background:rgba(74,222,128,0.1);color:var(--green);}

/* BUTTONS */
.btn-accept{padding:.45rem 1rem;font-size:.8rem;border:none;border-radius:8px;
  background:linear-gradient(135deg,var(--teal),#38b2ac);color:var(--ink);
  font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;transition:.2s;}
.btn-accept:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(79,209,197,0.3);}
.btn-complete{padding:.35rem .9rem;font-size:.78rem;border:1px solid rgba(74,222,128,0.3);
  border-radius:8px;background:transparent;color:var(--green);cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:.2s;}
.btn-complete:hover{background:rgba(74,222,128,0.1);}

/* EMPTY */
.empty{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty .icon{font-size:2.5rem;margin-bottom:.75rem;}
.empty p{font-size:.85rem;}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;
  padding:.8rem 1.3rem;border-radius:12px;font-size:.85rem;font-weight:500;
  transform:translateY(80px);opacity:0;transition:.3s ease;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{background:#1a2e1e;border:1px solid rgba(74,222,128,0.3);color:var(--green);}
.toast.error{background:#2e1a1a;border:1px solid rgba(248,113,113,0.3);color:var(--red);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:760px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .tasks-grid{grid-template-columns:1fr;}
  nav{flex-wrap:wrap;gap:.5rem;padding:1rem;}
  .nav-center{order:3;width:100%;}
  main{padding:1rem;}
}
</style>
</head>
<body>
<div class="bg"><div class="bg-grid"></div><div class="bg-orb o1"></div><div class="bg-orb o2"></div></div>

<div class="app">
  <nav>
    <div class="nav-logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-name">Free<span>Lance</span> Portal</div>
    </div>
    <div class="nav-center">
      <button class="tab-btn active" onclick="switchTab('open', this)">🔍 Browse Tasks</button>
      <button class="tab-btn" onclick="switchTab('mine', this)">💼 My Tasks</button>
    </div>
    <div class="nav-right">
      <span class="nav-user">Welcome, <strong id="nav-name">Freelancer</strong></span>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1 id="panel-title">Browse Open Tasks</h1>
      <p id="panel-sub">Find tasks that match your skills and start working</p>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card"><div class="stat-label">Available Tasks</div><div class="stat-value gold" id="stat-available">0</div></div>
      <div class="stat-card"><div class="stat-label">My Active</div><div class="stat-value teal" id="stat-active">0</div></div>
      <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value green" id="stat-done">0</div></div>
      <div class="stat-card"><div class="stat-label">Total Earned</div><div class="stat-value gold">—</div></div>
    </div>

    <!-- PANEL: OPEN TASKS -->
    <div class="panel active" id="panel-open">
      <div class="section-card">
        <div class="section-header">
          <span class="section-title">Open Tasks</span>
          <span class="section-badge" id="open-count">0 available</span>
        </div>
        <div class="tasks-grid" id="open-tasks-grid">
          <div class="empty"><div class="icon">🔍</div><p>Loading available tasks...</p></div>
        </div>
      </div>
    </div>

    <!-- PANEL: MY TASKS -->
    <div class="panel" id="panel-mine">
      <div class="section-card">
        <div class="section-header">
          <span class="section-title">My Assigned Tasks</span>
          <span class="section-badge" id="mine-count">0 tasks</span>
        </div>
        <div class="my-tasks-list" id="my-tasks-list">
          <div class="empty"><div class="icon">💼</div><p>You haven't accepted any tasks yet.</p></div>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  const freelancerId = user.id;
  if (!freelancerId) window.location.href = '/login.html';
  document.getElementById('nav-name').textContent = user.name || 'Freelancer';

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    if (tab === 'open') {
      document.getElementById('panel-title').textContent = 'Browse Open Tasks';
      document.getElementById('panel-sub').textContent = 'Find tasks that match your skills and start working';
      loadOpenTasks();
    } else {
      document.getElementById('panel-title').textContent = 'My Tasks';
      document.getElementById('panel-sub').textContent = 'Track your accepted and completed tasks';
      loadMyTasks();
    }
  }

  function getPriorityBadge(p) {
    if (!p) return '';
    const map = { HIGH:'badge-high', MEDIUM:'badge-medium', LOW:'badge-low' };
    return `<span class="badge ${map[p] || ''}">${p}</span>`;
  }

  function getStatusBadge(s) {
    const map = { OPEN:'badge-open', IN_PROGRESS:'badge-progress', COMPLETED:'badge-done' };
    const labels = { OPEN:'Open', IN_PROGRESS:'In Progress', COMPLETED:'Completed' };
    return `<span class="badge ${map[s] || ''}">${labels[s] || s}</span>`;
  }

  function loadOpenTasks() {
    fetch('/api/freelancer/tasks/open')
      .then(res => res.json())
      .then(tasks => {
        document.getElementById('stat-available').textContent = tasks.length;
        document.getElementById('open-count').textContent = tasks.length + ' available';
        const grid = document.getElementById('open-tasks-grid');
        if (!tasks.length) {
          grid.innerHTML = '<div class="empty"><div class="icon">🎉</div><p>No open tasks right now. Check back soon!</p></div>';
          return;
        }
        grid.innerHTML = tasks.map(task => `
          <div class="task-card">
            <div class="task-card-top">
              <span class="task-card-title">${task.title}</span>
              ${getPriorityBadge(task.piriority || task.priority)}
            </div>
            <div class="task-card-desc">${task.description || 'No description provided'}</div>
            <div class="task-card-footer">
              <div class="task-card-meta">${getStatusBadge(task.status)}</div>
              <button class="btn-accept" onclick="acceptTask(${task.id}, this)">Accept →</button>
            </div>
          </div>
        `).join('');
      })
      .catch(() => showToast('Failed to load tasks', 'error'));
  }

  function loadMyTasks() {
    fetch(`/api/freelancer/tasks/${freelancerId}`)
      .then(res => res.json())
      .then(tasks => {
        document.getElementById('stat-active').textContent = tasks.filter(t => t.status === 'IN_PROGRESS').length;
        document.getElementById('stat-done').textContent = tasks.filter(t => t.status === 'COMPLETED').length;
        document.getElementById('mine-count').textContent = tasks.length + ' tasks';
        const list = document.getElementById('my-tasks-list');
        if (!tasks.length) {
          list.innerHTML = '<div class="empty"><div class="icon">💼</div><p>You haven\'t accepted any tasks yet.</p></div>';
          return;
        }
        list.innerHTML = tasks.map(task => `
          <div class="my-task-item">
            <div class="my-task-top">
              <span class="my-task-title">${task.title}</span>
              ${getStatusBadge(task.status)}
            </div>
            <div class="my-task-desc">${task.description || 'No description'}</div>
            <div class="my-task-footer">
              <div class="task-card-meta">${getPriorityBadge(task.piriority || task.priority)}</div>
              ${task.status === 'IN_PROGRESS'
                ? `<button class="btn-complete" onclick="completeTask(${task.id}, this)">Mark Complete ✓</button>`
                : ''}
            </div>
          </div>
        `).join('');
      })
      .catch(() => showToast('Failed to load your tasks', 'error'));
  }

  function acceptTask(taskId, btn) {
    btn.textContent = 'Accepting...';
    btn.disabled = true;
    fetch(`/api/freelancer/tasks/${taskId}/accept?freelancerId=${freelancerId}`, { method: 'PUT' })
      .then(res => res.json())
      .then(data => {
        if (data.id) {
          showToast('Task accepted! Go to My Tasks to track it.');
          loadOpenTasks();
        } else {
          showToast(data || 'Failed to accept task', 'error');
          btn.textContent = 'Accept →';
          btn.disabled = false;
        }
      })
      .catch(() => { showToast('Network error', 'error'); btn.textContent = 'Accept →'; btn.disabled = false; });
  }

  function completeTask(taskId, btn) {
    if (!confirm('Mark this task as completed?')) return;
    btn.textContent = 'Completing...';
    btn.disabled = true;
    fetch(`/api/freelancer/tasks/${taskId}/complete`, { method: 'PUT' })
      .then(res => res.json())
      .then(data => {
        if (data.id) { showToast('Task marked as completed! 🎉'); loadMyTasks(); }
        else { showToast(data || 'Failed to complete task', 'error'); btn.textContent = 'Mark Complete ✓'; btn.disabled = false; }
      })
      .catch(() => { showToast('Network error', 'error'); btn.textContent = 'Mark Complete ✓'; btn.disabled = false; });
  }

  function logout() {
    localStorage.removeItem('user');
    window.location.href = '/login.html';
  }

  loadOpenTasks();
</script>
</body>
</html>
