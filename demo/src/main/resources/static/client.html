<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Client Dashboard — FreeLance Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#0b0c10;--ink-2:#1a1c23;--muted:#7a7f96;--muted-2:#a0a5bc;
  --surface:rgba(255,255,255,0.035);--surface-2:rgba(255,255,255,0.065);
  --border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.16);
  --gold:#e8c87a;--gold-dim:#b8973a;--gold-glow:rgba(232,200,122,0.18);
  --teal:#4fd1c5;--red:#f87171;--green:#4ade80;
  --text:#e8e9f0;--text-2:#c0c3d4;
}
html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--text);overflow-x:hidden;}

/* BG */
.bg{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 20% 10%,#141829 0%,transparent 65%),
  radial-gradient(ellipse 60% 80% at 80% 90%,#0d1a18 0%,transparent 60%),#0b0c10;}
.bg-grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
  background-size:48px 48px;}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;animation:drift 18s ease-in-out infinite alternate;}
.o1{width:500px;height:500px;top:-140px;left:-100px;background:radial-gradient(circle,#1a2a4a 0%,transparent 75%);animation-duration:22s;}
.o2{width:420px;height:420px;bottom:-120px;right:-100px;background:radial-gradient(circle,#0d2a25 0%,transparent 75%);animation-duration:17s;}
@keyframes drift{from{transform:translate(0,0) scale(1);}to{transform:translate(30px,25px) scale(1.06);}}

/* LAYOUT */
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}

/* NAVBAR */
nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;
  border-bottom:1px solid var(--border);backdrop-filter:blur(20px);
  background:rgba(11,12,16,0.6);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--gold-dim),var(--gold));
  display:flex;align-items:center;justify-content:center;font-size:16px;
  box-shadow:0 0 16px var(--gold-glow);}
.logo-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:.04em;}
.logo-name span{color:var(--gold);}
.nav-right{display:flex;align-items:center;gap:1rem;}
.nav-user{font-size:.85rem;color:var(--muted-2);}
.nav-user strong{color:var(--gold);}
.btn-logout{padding:.45rem 1rem;border:1px solid var(--border-2);border-radius:8px;
  background:transparent;color:var(--muted-2);font-size:.8rem;cursor:pointer;
  transition:.2s;font-family:'DM Sans',sans-serif;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}

/* MAIN */
main{flex:1;padding:2rem;max-width:1100px;width:100%;margin:0 auto;}

/* PAGE HEADER */
.page-header{margin-bottom:2rem;animation:fadeUp .5s ease forwards;}
.page-header h1{font-family:'Syne',sans-serif;font-size:1.8rem;margin-bottom:.3rem;}
.page-header p{color:var(--muted-2);font-size:.9rem;}

/* STATS ROW */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:1.2rem 1.4rem;animation:fadeUp .5s ease forwards;}
.stat-card:nth-child(1){animation-delay:.1s;}
.stat-card:nth-child(2){animation-delay:.2s;}
.stat-card:nth-child(3){animation-delay:.3s;}
.stat-card:nth-child(4){animation-delay:.4s;}
.stat-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;}
.stat-value{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:700;}
.stat-value.gold{color:var(--gold);}
.stat-value.teal{color:var(--teal);}
.stat-value.green{color:var(--green);}
.stat-value.red{color:var(--red);}

/* GRID */
.content-grid{display:grid;grid-template-columns:1fr 1.6fr;gap:1.5rem;}

/* CARD */
.card{background:linear-gradient(145deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));
  border:1px solid var(--border-2);border-radius:20px;padding:1.6rem;
  animation:fadeUp .5s ease .5s both;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;}
.card-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;}
.card-badge{font-size:.72rem;padding:.3rem .7rem;border-radius:99px;
  background:rgba(232,200,122,0.12);color:var(--gold);border:1px solid rgba(232,200,122,0.2);}

/* FORM */
.form{display:flex;flex-direction:column;gap:1rem;}
.field label{display:block;font-size:.75rem;color:var(--muted-2);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem;}
.field input,.field select,.field textarea{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:.7rem 1rem;color:var(--text);font-size:.88rem;
  font-family:'DM Sans',sans-serif;outline:none;transition:.2s;resize:none;}
.field input::placeholder,.field textarea::placeholder{color:var(--muted);}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:rgba(232,200,122,0.4);background:var(--surface-2);
  box-shadow:0 0 0 3px rgba(232,200,122,0.08);}
.field select option{background:#1a1c23;color:var(--text);}
.btn-create{width:100%;padding:.8rem;border:none;border-radius:10px;cursor:pointer;
  background:linear-gradient(135deg,var(--gold),#d4a843);color:var(--ink);
  font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;letter-spacing:.04em;
  transition:.2s;box-shadow:0 6px 20px rgba(232,200,122,0.2);}
.btn-create:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(232,200,122,0.3);}
.btn-create:disabled{opacity:.6;cursor:not-allowed;transform:none;}

/* TASKS LIST */
.tasks-list{display:flex;flex-direction:column;gap:.8rem;max-height:520px;overflow-y:auto;padding-right:4px;}
.tasks-list::-webkit-scrollbar{width:4px;}
.tasks-list::-webkit-scrollbar-track{background:transparent;}
.tasks-list::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:99px;}

.task-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:1rem 1.1rem;transition:.2s;cursor:default;}
.task-item:hover{border-color:var(--border-2);background:var(--surface-2);}
.task-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.5rem;}
.task-title{font-weight:500;font-size:.9rem;}
.task-desc{font-size:.8rem;color:var(--muted-2);margin-bottom:.7rem;line-height:1.5;}
.task-footer{display:flex;align-items:center;justify-content:space-between;}
.task-meta{display:flex;gap:.5rem;align-items:center;}

/* BADGES */
.badge{font-size:.68rem;padding:.25rem .65rem;border-radius:99px;font-weight:500;letter-spacing:.03em;}
.badge-open{background:rgba(232,200,122,0.12);color:var(--gold);border:1px solid rgba(232,200,122,0.2);}
.badge-progress{background:rgba(79,209,197,0.1);color:var(--teal);border:1px solid rgba(79,209,197,0.2);}
.badge-done{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.2);}
.badge-cancelled{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.2);}
.badge-high{background:rgba(248,113,113,0.1);color:var(--red);}
.badge-medium{background:rgba(232,200,122,0.1);color:var(--gold);}
.badge-low{background:rgba(74,222,128,0.1);color:var(--green);}

.btn-cancel{padding:.3rem .75rem;font-size:.75rem;border:1px solid rgba(248,113,113,0.3);
  border-radius:7px;background:transparent;color:var(--red);cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:.2s;}
.btn-cancel:hover{background:rgba(248,113,113,0.1);}

/* EMPTY */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);}
.empty .icon{font-size:2.5rem;margin-bottom:.75rem;}
.empty p{font-size:.85rem;}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;
  padding:.8rem 1.3rem;border-radius:12px;font-size:.85rem;font-weight:500;
  transform:translateY(80px);opacity:0;transition:.3s ease;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{background:#1a2e1e;border:1px solid rgba(74,222,128,0.3);color:var(--green);}
.toast.error{background:#2e1a1a;border:1px solid rgba(248,113,113,0.3);color:var(--red);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:760px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .content-grid{grid-template-columns:1fr;}
  nav{padding:1rem;}
  main{padding:1rem;}
}
</style>
</head>
<body>
<div class="bg"><div class="bg-grid"></div><div class="bg-orb o1"></div><div class="bg-orb o2"></div></div>

<div class="app">
  <!-- NAV -->
  <nav>
    <div class="nav-logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-name">Free<span>Lance</span> Portal</div>
    </div>
    <div class="nav-right">
      <span class="nav-user">Welcome, <strong id="nav-name">Client</strong></span>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <main>
    <!-- HEADER -->
    <div class="page-header">
      <h1>Client Dashboard</h1>
      <p>Manage your tasks and track progress</p>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card"><div class="stat-label">Total Tasks</div><div class="stat-value gold" id="stat-total">0</div></div>
      <div class="stat-card"><div class="stat-label">Open</div><div class="stat-value teal" id="stat-open">0</div></div>
      <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-value" id="stat-progress">0</div></div>
      <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value green" id="stat-done">0</div></div>
    </div>

    <!-- GRID -->
    <div class="content-grid">
      <!-- CREATE TASK -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Create New Task</span>
          <span class="card-badge">+ New</span>
        </div>
        <form class="form" id="create-form">
          <div class="field">
            <label>Task Title</label>
            <input type="text" id="t-title" placeholder="e.g. Design a logo" required/>
          </div>
          <div class="field">
            <label>Description</label>
            <textarea id="t-desc" rows="3" placeholder="Describe what you need..."></textarea>
          </div>
          <div class="field">
            <label>Priority</label>
            <select id="t-priority">
              <option value="HIGH">🔴 High</option>
              <option value="MEDIUM" selected>🟡 Medium</option>
              <option value="LOW">🟢 Low</option>
            </select>
          </div>
          <button type="submit" class="btn-create" id="create-btn">Create Task →</button>
        </form>
      </div>

      <!-- TASKS LIST -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">My Tasks</span>
          <span class="card-badge" id="tasks-count">0 tasks</span>
        </div>
        <div class="tasks-list" id="tasks-list">
          <div class="empty"><div class="icon">📋</div><p>No tasks yet. Create your first one!</p></div>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
  // Get logged in user from localStorage
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  const clientId = user.id;

  if (!clientId) window.location.href = '/login.html';

  document.getElementById('nav-name').textContent = user.name || 'Client';

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function getPriorityBadge(p) {
    if (!p) return '';
    const map = { HIGH:'badge-high', MEDIUM:'badge-medium', LOW:'badge-low' };
    return `<span class="badge ${map[p] || ''}">${p}</span>`;
  }

  function getStatusBadge(s) {
    const map = {
      OPEN:'badge-open', IN_PROGRESS:'badge-progress',
      COMPLETED:'badge-done', CANCELLED:'badge-cancelled'
    };
    const labels = { OPEN:'Open', IN_PROGRESS:'In Progress', COMPLETED:'Completed', CANCELLED:'Cancelled' };
    return `<span class="badge ${map[s] || ''}">${labels[s] || s}</span>`;
  }

  function updateStats(tasks) {
    document.getElementById('stat-total').textContent = tasks.length;
    document.getElementById('stat-open').textContent = tasks.filter(t=>t.status==='OPEN').length;
    document.getElementById('stat-progress').textContent = tasks.filter(t=>t.status==='IN_PROGRESS').length;
    document.getElementById('stat-done').textContent = tasks.filter(t=>t.status==='COMPLETED').length;
    document.getElementById('tasks-count').textContent = tasks.length + ' tasks';
  }

  function renderTasks(tasks) {
    updateStats(tasks);
    const list = document.getElementById('tasks-list');
    if (!tasks.length) {
      list.innerHTML = '<div class="empty"><div class="icon">📋</div><p>No tasks yet. Create your first one!</p></div>';
      return;
    }
    list.innerHTML = tasks.map(task => `
      <div class="task-item" id="task-${task.id}">
        <div class="task-top">
          <span class="task-title">${task.title}</span>
          ${getStatusBadge(task.status)}
        </div>
        <div class="task-desc">${task.description || 'No description'}</div>
        <div class="task-footer">
          <div class="task-meta">
            ${getPriorityBadge(task.piriority || task.priority)}
          </div>
          ${task.status === 'OPEN' || task.status === 'IN_PROGRESS'
            ? `<button class="btn-cancel" onclick="cancelTask(${task.id})">Cancel</button>`
            : ''}
        </div>
      </div>
    `).join('');
  }

  function loadTasks() {
    fetch(`/api/users/${clientId}/tasks`)
      .then(res => res.json())
      .then(data => renderTasks(Array.isArray(data) ? data : []))
      .catch(() => showToast('Failed to load tasks', 'error'));
  }

  document.getElementById('create-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('create-btn');
    btn.textContent = 'Creating...';
    btn.disabled = true;

    const payload = {
      title: document.getElementById('t-title').value.trim(),
      description: document.getElementById('t-desc').value.trim(),
      piriority: document.getElementById('t-priority').value
    };

    fetch(`/api/tasks/create?clientId=${clientId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
      if (data.id) {
        showToast('Task created successfully!');
        document.getElementById('create-form').reset();
        loadTasks();
      } else {
        showToast(data.message || 'Failed to create task', 'error');
      }
    })
    .catch(() => showToast('Network error', 'error'))
    .finally(() => {
      btn.textContent = 'Create Task →';
      btn.disabled = false;
    });
  });

  function cancelTask(taskId) {
    if (!confirm('Cancel this task?')) return;
    fetch(`/api/tasks/${taskId}/cancel`, { method: 'PUT' })
      .then(res => res.json())
      .then(() => { showToast('Task cancelled'); loadTasks(); })
      .catch(() => showToast('Failed to cancel task', 'error'));
  }

  function logout() {
    localStorage.removeItem('user');
    window.location.href = '/login.html';
  }

  // Load on start
  loadTasks();
</script>
</body>
</html>
