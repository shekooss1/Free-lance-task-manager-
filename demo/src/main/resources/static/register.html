<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — FreeLance Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink:       #0b0c10;
            --ink-2:     #1a1c23;
            --ink-3:     #2a2d38;
            --muted:     #7a7f96;
            --muted-2:   #a0a5bc;
            --surface:   rgba(255,255,255,0.035);
            --surface-2: rgba(255,255,255,0.065);
            --border:    rgba(255,255,255,0.08);
            --border-2:  rgba(255,255,255,0.16);
            --gold:      #e8c87a;
            --gold-dim:  #b8973a;
            --gold-glow: rgba(232,200,122,0.18);
            --teal:      #4fd1c5;
            --teal-dim:  rgba(79,209,197,0.12);
            --red-err:   #f87171;
            --text:      #e8e9f0;
            --text-2:    #c0c3d4;
        }

        html, body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--ink);
            color: var(--text);
            overflow-x: hidden;
        }

        /* ── ANIMATED BACKGROUND ─────────────────────────── */
        .bg {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse 80% 60% at 20% 10%, #141829 0%, transparent 65%),
            radial-gradient(ellipse 60% 80% at 80% 90%, #0d1a18 0%, transparent 60%),
            #0b0c10;
        }
        .bg-orb {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.55;
            animation: drift 18s ease-in-out infinite alternate;
        }
        .bg-orb.o1 {
            width: 520px; height: 520px;
            top: -160px; left: -100px;
            background: radial-gradient(circle, #1a2a4a 0%, #0a1520 60%, transparent 80%);
            animation-duration: 22s;
        }
        .bg-orb.o2 {
            width: 400px; height: 400px;
            bottom: -80px; right: -80px;
            background: radial-gradient(circle, #0d2a25 0%, #061510 60%, transparent 80%);
            animation-duration: 17s; animation-delay: -6s;
        }
        .bg-orb.o3 {
            width: 260px; height: 260px;
            top: 40%; left: 55%;
            background: radial-gradient(circle, rgba(232,200,122,0.07) 0%, transparent 70%);
            animation-duration: 14s; animation-delay: -3s;
        }
        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(40px, 30px) scale(1.06); }
        }

        /* Grid lines overlay */
        .bg-grid {
            position: absolute; inset: 0;
            background-image:
                    linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        /* ── LAYOUT ──────────────────────────────────────── */
        .page {
            position: relative; z-index: 1;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 2rem 1rem;
        }

        /* ── CARD ────────────────────────────────────────── */
        .card {
            width: 100%; max-width: 460px;
            background: linear-gradient(145deg, rgba(255,255,255,0.055), rgba(255,255,255,0.02));
            border: 1px solid var(--border-2);
            border-radius: 24px;
            padding: 2.8rem 2.6rem 2.4rem;
            backdrop-filter: blur(28px) saturate(1.4);
            box-shadow:
                    0 0 0 1px rgba(255,255,255,0.04) inset,
                    0 40px 80px rgba(0,0,0,0.55),
                    0 0 60px rgba(232,200,122,0.04);
            opacity: 0;
            transform: translateY(24px);
            animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
        }
        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── LOGO / HEADER ───────────────────────────────── */
        .logo-row {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 2rem;
            opacity: 0; animation: fadeUp 0.5s ease 0.4s forwards;
        }
        .logo-icon {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, var(--gold-dim), var(--gold));
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
            box-shadow: 0 0 20px var(--gold-glow);
        }
        .logo-name {
            font-family: 'Syne', sans-serif;
            font-weight: 700; font-size: 1rem;
            letter-spacing: 0.04em;
            color: var(--text);
        }
        .logo-name span { color: var(--gold); }

        .heading {
            font-family: 'Syne', sans-serif;
            font-weight: 700; font-size: 1.75rem;
            line-height: 1.15; letter-spacing: -0.02em;
            margin-bottom: 0.4rem;
            opacity: 0; animation: fadeUp 0.5s ease 0.5s forwards;
        }
        .subheading {
            font-size: 0.88rem; color: var(--muted-2);
            font-weight: 300; margin-bottom: 1.8rem;
            opacity: 0; animation: fadeUp 0.5s ease 0.6s forwards;
        }
        .subheading a {
            color: var(--gold); text-decoration: none; font-weight: 500;
            transition: opacity 0.2s;
        }
        .subheading a:hover { opacity: 0.75; }

        /* ── ROLE TOGGLE ─────────────────────────────────── */
        .role-toggle {
            display: flex; gap: 6px; margin-bottom: 1.6rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 12px; padding: 4px;
            opacity: 0; animation: fadeUp 0.5s ease 0.65s forwards;
        }
        .role-btn {
            flex: 1; padding: 0.5rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem; font-weight: 500;
            border: none; border-radius: 9px;
            cursor: pointer; transition: all 0.25s ease;
            background: transparent; color: var(--muted-2);
            letter-spacing: 0.02em;
        }
        .role-btn.active {
            background: linear-gradient(135deg, #1a2a1e, #0f2018);
            color: var(--teal);
            border: 1px solid rgba(79,209,197,0.25);
            box-shadow: 0 2px 12px rgba(79,209,197,0.1);
        }

        /* ── FORM ────────────────────────────────────────── */
        .form { display: flex; flex-direction: column; gap: 1.1rem; }

        .field {
            opacity: 0; animation: fadeUp 0.5s ease forwards;
        }
        .field:nth-child(1) { animation-delay: 0.7s; }
        .field:nth-child(2) { animation-delay: 0.78s; }
        .field:nth-child(3) { animation-delay: 0.86s; }
        .field:nth-child(4) { animation-delay: 0.94s; }

        .field label {
            display: block; font-size: 0.78rem;
            font-weight: 500; color: var(--muted-2);
            letter-spacing: 0.06em; text-transform: uppercase;
            margin-bottom: 0.45rem;
        }

        .input-wrap {
            position: relative;
        }
        .input-wrap .icon {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted); font-size: 15px;
            pointer-events: none; transition: color 0.2s;
        }
        .input-wrap input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.78rem 1rem 0.78rem 2.6rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem; font-weight: 400;
            color: var(--text);
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
            caret-color: var(--gold);
        }
        .input-wrap input::placeholder { color: var(--muted); }
        .input-wrap input:focus {
            background: var(--surface-2);
            border-color: rgba(232,200,122,0.4);
            box-shadow: 0 0 0 3px rgba(232,200,122,0.08), 0 0 20px rgba(232,200,122,0.05);
        }
        .input-wrap input:focus + .icon,
        .input-wrap input:focus ~ .icon { color: var(--gold); }
        .input-wrap:has(input:focus) .icon { color: var(--gold); }

        /* password toggle */
        .pw-toggle {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: var(--muted); cursor: pointer;
            font-size: 14px; padding: 2px;
            transition: color 0.2s;
        }
        .pw-toggle:hover { color: var(--text-2); }

        /* validation states */
        .input-wrap input.valid {
            border-color: rgba(74,222,128,0.4);
        }
        .input-wrap input.invalid {
            border-color: rgba(248,113,113,0.5);
            box-shadow: 0 0 0 3px rgba(248,113,113,0.06);
        }
        .err-msg {
            font-size: 0.75rem; color: var(--red-err);
            margin-top: 0.35rem; display: none;
            padding-left: 2px;
        }
        .err-msg.show { display: block; }

        /* ── PASSWORD STRENGTH ───────────────────────────── */
        .strength-bar {
            display: flex; gap: 4px; margin-top: 0.5rem;
        }
        .strength-bar span {
            flex: 1; height: 3px; border-radius: 99px;
            background: var(--border); transition: background 0.3s;
        }
        .strength-bar span.weak   { background: var(--red-err); }
        .strength-bar span.fair   { background: #f59e0b; }
        .strength-bar span.strong { background: #4ade80; }

        /* ── ROLE NOTE ───────────────────────────────────── */
        .role-note {
            font-size: 0.78rem; color: var(--muted);
            background: rgba(79,209,197,0.06);
            border: 1px solid rgba(79,209,197,0.12);
            border-radius: 8px; padding: 0.55rem 0.75rem;
            margin-top: -0.3rem; display: none;
        }
        .role-note.show { display: block; }

        /* ── TERMS ROW ───────────────────────────────────── */
        .terms-row {
            display: flex; align-items: flex-start; gap: 10px;
            opacity: 0; animation: fadeUp 0.5s ease 1.02s forwards;
        }
        .terms-row input[type="checkbox"] { display: none; }
        .custom-check {
            width: 18px; height: 18px; flex-shrink: 0;
            border: 1.5px solid var(--border-2); border-radius: 5px;
            background: var(--surface);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            margin-top: 1px; transition: border-color 0.2s, background 0.2s;
        }
        .custom-check svg { display: none; }
        .terms-row:has(input:checked) .custom-check {
            background: var(--gold); border-color: var(--gold);
        }
        .terms-row:has(input:checked) .custom-check svg { display: block; }
        .terms-text {
            font-size: 0.8rem; color: var(--muted-2); line-height: 1.5;
        }
        .terms-text a { color: var(--gold); text-decoration: none; }
        .terms-text a:hover { text-decoration: underline; }

        /* ── SUBMIT BUTTON ───────────────────────────────── */
        .btn-submit {
            position: relative; overflow: hidden;
            width: 100%; padding: 0.85rem;
            font-family: 'Syne', sans-serif;
            font-size: 0.92rem; font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--ink);
            background: linear-gradient(135deg, var(--gold), #d4a843);
            border: none; border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 0 0 1px rgba(232,200,122,0.3), 0 8px 24px rgba(232,200,122,0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s;
            opacity: 0; animation: fadeUp 0.5s ease 1.1s forwards;
        }
        .btn-submit::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0; transition: opacity 0.2s;
        }
        .btn-submit:hover::before { opacity: 1; }
        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 0 1px rgba(232,200,122,0.4), 0 12px 30px rgba(232,200,122,0.3);
        }
        .btn-submit:active { transform: translateY(0); }

        /* shimmer sweep */
        .btn-submit::after {
            content: '';
            position: absolute; top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.5s ease;
        }
        .btn-submit:hover::after { left: 150%; }

        /* ── DIVIDER ─────────────────────────────────────── */
        .divider {
            display: flex; align-items: center; gap: 12px;
            opacity: 0; animation: fadeUp 0.5s ease 1.18s forwards;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1;
            height: 1px; background: var(--border);
        }
        .divider span { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

        /* ── SOCIAL BUTTONS ──────────────────────────────── */
        .social-row {
            display: flex; gap: 10px;
            opacity: 0; animation: fadeUp 0.5s ease 1.25s forwards;
        }
        .btn-social {
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 0.65rem;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem; font-weight: 500; color: var(--text-2);
            transition: border-color 0.2s, background 0.2s, color 0.2s;
            text-decoration: none;
        }
        .btn-social:hover {
            background: var(--surface-2);
            border-color: var(--border-2);
            color: var(--text);
        }
        .btn-social img { width: 16px; height: 16px; }

        /* ── ANIMATIONS ──────────────────────────────────── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── RESPONSIVE ──────────────────────────────────── */
        @media (max-width: 500px) {
            .card { padding: 2rem 1.5rem; }
            .heading { font-size: 1.5rem; }
            .social-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="bg">
    <div class="bg-grid"></div>
    <div class="bg-orb o1"></div>
    <div class="bg-orb o2"></div>
    <div class="bg-orb o3"></div>
</div>

<div class="page">
    <div class="card">

        <!-- Logo -->
        <div class="logo-row">
            <div class="logo-icon">⚡</div>
            <div class="logo-name">Free<span>Lance</span> Portal</div>
        </div>

        <!-- Heading -->
        <h1 class="heading">Create your account</h1>
        <p class="subheading">Already have one? <a href="login.html">Sign in instead</a></p>

        <!-- Role toggle -->
        <div class="role-toggle">
            <button class="role-btn active" onclick="setRole('CLIENT', this)">👤 I'm a Client</button>
            <button class="role-btn" onclick="setRole('FREELANCER', this)">💼 I'm a Freelancer</button>
        </div>

        <!-- Role note -->
        <div class="role-note" id="role-note">
            As a freelancer you'll be able to browse open tasks, accept work, and mark tasks complete.
        </div>

        <!-- Form -->
        <form class="form" id="reg-form" novalidate>

            <div class="field">
                <label for="name">Full name</label>
                <div class="input-wrap">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" id="name" placeholder="John Doe" autocomplete="name" oninput="liveValidate(this, 'name')"/>
                </div>
                <div class="err-msg" id="err-name">Please enter your full name.</div>
            </div>

            <div class="field">
                <label for="email">Email address</label>
                <div class="input-wrap">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" oninput="liveValidate(this, 'email')"/>
                </div>
                <div class="err-msg" id="err-email">Please enter a valid email address.</div>
            </div>

            <div class="field">
                <label for="phone">Phone number</label>
                <div class="input-wrap">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13 19.8 19.8 0 0 1 1.58 4.36 2 2 0 0 1 3.55 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.18 6.18l.9-.9a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    <input type="tel" id="phone" placeholder="+20 100 000 0000" autocomplete="tel" oninput="liveValidate(this, 'phone')"/>
                </div>
                <div class="err-msg" id="err-phone">Enter a valid phone number.</div>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength(this.value); liveValidate(this, 'password')"/>
                    <button type="button" class="pw-toggle" onclick="togglePw('password', this)" aria-label="Toggle password visibility">
                        <svg id="eye-pw" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <div class="strength-bar" id="strength-bar">
                    <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
                </div>
                <div class="err-msg" id="err-password">Password must be at least 8 characters.</div>
            </div>

            <!-- Terms -->
            <label class="terms-row">
                <input type="checkbox" id="terms"/>
                <div class="custom-check" onclick="document.getElementById('terms').click()">
                    <svg width="10" height="8" viewBox="0 0 10 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M1 4L3.5 6.5L9 1" stroke="#0b0c10" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="terms-text">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
            </label>

            <button type="submit" class="btn-submit" id="submit-btn">
                Create account →
            </button>

        </form>





    </div>
</div>







<script>
    let currentRole = 'CLIENT';

    function setRole(role, btn) {
        currentRole = role;
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const note = document.getElementById('role-note');
        if (role === 'FREELANCER') {
            note.classList.add('show');
        } else {
            note.classList.remove('show');
        }
    }

    function liveValidate(input, type) {
        const err = document.getElementById('err-' + type);
        let valid = false;
        if (type === 'email') valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input.value.trim());
        else if (type === 'password') valid = input.value.length >= 8;
        else if (type === 'name') valid = input.value.trim().length >= 2;
        else if (type === 'phone') valid = /^\+?[\d\s\-()]{7,}$/.test(input.value.trim());

        if (input.value === '') {
            input.classList.remove('valid', 'invalid');
            err.classList.remove('show');
        } else if (valid) {
            input.classList.add('valid');
            input.classList.remove('invalid');
            err.classList.remove('show');
        } else {
            input.classList.add('invalid');
            input.classList.remove('valid');
            err.classList.add('show');
        }
    }

    function checkStrength(val) {
        const bars = [document.getElementById('s1'), document.getElementById('s2'),
            document.getElementById('s3'), document.getElementById('s4')];
        bars.forEach(b => b.className = '');
        if (!val) return;
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const cls = score <= 1 ? 'weak' : score === 2 ? 'fair' : 'strong';
        bars.slice(0, score).forEach(b => b.className = cls);
    }

    function togglePw(id, btn) {
        const inp = document.getElementById(id);
        if (inp.type === 'password') {
            inp.type = 'text';
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>`;
        } else {
            inp.type = 'password';
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>`;
        }
    }

    document.getElementById('reg-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const name     = document.getElementById('name').value.trim();
        const email    = document.getElementById('email').value.trim();
        const phone    = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const terms    = document.getElementById('terms').checked;

        let ok = true;
        if (name.length < 2)   { document.getElementById('err-name').classList.add('show');     document.getElementById('name').classList.add('invalid');     ok = false; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('err-email').classList.add('show'); document.getElementById('email').classList.add('invalid'); ok = false; }
        if (!/^\+?[\d\s\-()]{7,}$/.test(phone)) { document.getElementById('err-phone').classList.add('show'); document.getElementById('phone').classList.add('invalid'); ok = false; }
        if (password.length < 8) { document.getElementById('err-password').classList.add('show'); document.getElementById('password').classList.add('invalid'); ok = false; }
        if (!terms) { ok = false; }

        if (!ok) return;

        // Build the object your backend expects
        const payload = { name, email, phone, password, role: currentRole };

        // POST to Spring Boot
        const btn = document.getElementById('submit-btn');
        btn.textContent = 'Creating account…';
        btn.disabled = true;

        fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
            .then(res => res.json())
            .then(data => {
                if (data.id) {
                    btn.textContent = '✓ Account created!';
                    btn.style.background = 'linear-gradient(135deg, #4ade80, #22c55e)';
                } else {
                    btn.textContent = data.message || 'Something went wrong';
                    btn.style.background = 'linear-gradient(135deg, #f87171, #ef4444)';
                    btn.disabled = false;
                    setTimeout(() => {
                        btn.textContent = 'Create account →';
                        btn.style.background = '';
                        btn.disabled = false;
                    }, 3000);
                }
            })
            .catch(() => {
                btn.textContent = 'Network error — try again';
                btn.style.background = 'linear-gradient(135deg, #f87171, #ef4444)';
                btn.disabled = false;
                setTimeout(() => {
                    btn.textContent = 'Create account →';
                    btn.style.background = '';
                    btn.disabled = false;
                }, 3000);
            });
    });
</script>
</body>
</html>
