<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reset Password — FreeLance Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --ink: #0b0c10; --muted: #7a7f96; --muted-2: #a0a5bc;
            --surface: rgba(255,255,255,0.035); --surface-2: rgba(255,255,255,0.065);
            --border: rgba(255,255,255,0.08); --border-2: rgba(255,255,255,0.16);
            --gold: #e8c87a; --gold-dim: #b8973a; --gold-glow: rgba(232,200,122,0.18);
            --text: #e8e9f0; --red: #f87171; --green: #4ade80;
        }
        html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--ink); color: var(--text); overflow-x: hidden; }
        .bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 80% 60% at 20% 10%, #141829 0%, transparent 65%), radial-gradient(ellipse 60% 80% at 80% 90%, #0d1a18 0%, transparent 60%), #0b0c10; }
        .bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 48px 48px; }
        .bg-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.55; animation: drift 18s ease-in-out infinite alternate; }
        .o1 { width: 500px; height: 500px; top: -140px; left: -100px; background: radial-gradient(circle, #1a2a4a 0%, transparent 75%); }
        .o2 { width: 420px; height: 420px; bottom: -120px; right: -100px; background: radial-gradient(circle, #0d2a25 0%, transparent 75%); }
        @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,25px) scale(1.06); } }
        .page { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .card { width: 100%; max-width: 430px; background: linear-gradient(145deg, rgba(255,255,255,0.055), rgba(255,255,255,0.02)); border: 1px solid var(--border-2); border-radius: 24px; padding: 2.6rem; backdrop-filter: blur(28px) saturate(1.4); box-shadow: 0 40px 80px rgba(0,0,0,0.55); animation: cardIn .7s ease forwards; }
        @keyframes cardIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; }
        .logo-icon { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, var(--gold-dim), var(--gold)); display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 0 20px var(--gold-glow); }
        .logo-name { font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: .04em; }
        .logo-name span { color: var(--gold); }
        .heading { font-family: 'Syne', sans-serif; font-size: 1.9rem; margin-bottom: .4rem; }
        .subheading { color: var(--muted-2); font-size: .9rem; margin-bottom: 2rem; }
        .form { display: flex; flex-direction: column; gap: 1.2rem; }
        .field label { display: block; margin-bottom: .5rem; font-size: .78rem; color: var(--muted-2); text-transform: uppercase; letter-spacing: .06em; }
        .input-wrap { position: relative; }
        .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); }
        .input-wrap input { width: 100%; padding: .85rem 1rem .85rem 2.7rem; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; outline: none; color: var(--text); font-size: .92rem; transition: .25s; }
        .input-wrap input::placeholder { color: var(--muted); }
        .input-wrap input:focus { border-color: rgba(232,200,122,0.45); background: var(--surface-2); box-shadow: 0 0 0 3px rgba(232,200,122,0.08); }
        .pw-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; }
        .btn-submit { width: 100%; padding: .9rem; border: none; border-radius: 12px; cursor: pointer; background: linear-gradient(135deg, var(--gold), #d4a843); color: var(--ink); font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: .04em; transition: .25s; box-shadow: 0 8px 24px rgba(232,200,122,0.25); }
        .btn-submit:hover { transform: translateY(-2px); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .msg { display: none; font-size: .85rem; padding: .75rem 1rem; border-radius: 10px; }
        .msg.error { display: block; color: var(--red); background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); }
        .msg.success { display: block; color: var(--green); background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); }
        .invalid-token { text-align: center; padding: 2rem 0; }
        .invalid-token p { color: var(--red); margin-bottom: 1rem; }
        .invalid-token a { color: var(--gold); }
    </style>
</head>
<body>
<div class="bg"><div class="bg-grid"></div><div class="bg-orb o1"></div><div class="bg-orb o2"></div></div>
<div class="page">
    <div class="card">
        <div class="logo-row">
            <div class="logo-icon">⚡</div>
            <div class="logo-name">Free<span>Lance</span> Portal</div>
        </div>

        <div id="valid-form">
            <h1 class="heading">Set new password</h1>
            <p class="subheading">Choose a strong password for your account.</p>
            <div class="form">
                <div class="field">
                    <label>New Password</label>
                    <div class="input-wrap">
                        <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" id="newPassword" placeholder="Min. 8 characters"/>
                        <button type="button" class="pw-toggle" onclick="togglePw('newPassword')">👁</button>
                    </div>
                </div>
                <div class="field">
                    <label>Confirm Password</label>
                    <div class="input-wrap">
                        <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" id="confirmPassword" placeholder="Repeat password"/>
                        <button type="button" class="pw-toggle" onclick="togglePw('confirmPassword')">👁</button>
                    </div>
                </div>
                <div class="msg" id="msg"></div>
                <button class="btn-submit" id="btn" onclick="doReset()">Update Password →</button>
            </div>
        </div>

        <div id="invalid-form" class="invalid-token" style="display:none">
            <p>⚠️ This reset link is missing or invalid.</p>
            <a href="forgot-password.html">Request a new one →</a>
        </div>
    </div>
</div>
<script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
        document.getElementById('valid-form').style.display = 'none';
        document.getElementById('invalid-form').style.display = 'block';
    }

    function togglePw(id) {
        const inp = document.getElementById(id);
        inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    function doReset() {
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const btn = document.getElementById('btn');
        const msg = document.getElementById('msg');
        msg.className = 'msg';

        if (newPassword.length < 8) {
            msg.className = 'msg error';
            msg.textContent = 'Password must be at least 8 characters.';
            return;
        }
        if (newPassword !== confirmPassword) {
            msg.className = 'msg error';
            msg.textContent = 'Passwords do not match.';
            return;
        }

        btn.textContent = 'Updating...';
        btn.disabled = true;

        fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, newPassword })
        })
            .then(res => res.text())
            .then(text => {
                if (text.includes('successfully')) {
                    msg.className = 'msg success';
                    msg.textContent = '✓ Password updated! Redirecting to login...';
                    setTimeout(() => window.location.href = '/login.html', 2000);
                } else {
                    msg.className = 'msg error';
                    msg.textContent = text;
                    btn.textContent = 'Update Password →';
                    btn.disabled = false;
                }
            })
            .catch(() => {
                msg.className = 'msg error';
                msg.textContent = 'Something went wrong. Please try again.';
                btn.textContent = 'Update Password →';
                btn.disabled = false;
            });
    }
</script>
</body>
</html>
